// gradle/versions.gradle
ext {
    // Project versions
    projectVersion = '1.0.0'
    projectGroup = 'com.eventledger'
    javaVersion = '17'

    // Spring Framework
    springBootVersion = '3.1.5'
    springDependencyManagementVersion = '1.1.3'
    springCloudVersion = '2022.0.4'

    // OpenTelemetry
    opentelemetryVersion = '1.31.0'
    opentelemetryInstrumentationVersion = '1.31.0'
    opentelemetryExporterJaegerVersion = '1.15.0'

    // Micrometer
    micrometerPrometheusVersion = '1.11.0'

    // Logging
    logstashEncoderVersion = '7.4'

    // SpringDoc
    springdocVersion = '2.0.2'

    // Testing
    junitVersion = '5.9.2'
    mockitoVersion = '5.2.1'
    h2DatabaseVersion = '2.1.214'
}