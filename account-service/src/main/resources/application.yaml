spring:
  application:
    name: account-service
  profiles:
    active: dev

  # H2 Database Configuration
  datasource:
    url: jdbc:h2:mem:eventledger_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;MODE=MySQL
    driverClassName: org.h2.Driver
    username: sa
    password:

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop  # create-drop for dev, validate for prod
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true

  # H2 Console (for development)
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8081
  servlet:
    context-path: /api/v1

# OpenTelemetry Configuration
otel:
  service:
    name: account-service
  jaeger:
    endpoint: http://localhost:14268/api/traces
  sdk:
    disabled: false
  traces:
    sampler:
      type: alwaysOn

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
  health:
    defaults:
      enabled: true
    diskspace:
      enabled: true
    circuitbreakers:
      enabled: true
  metrics:
    enable:
      jvm: true
      process: true
      system: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
    export:
      prometheus:
        enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.eventledger.account: DEBUG
    org.springframework: INFO
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [traceId=%X{traceId:-N/A}] [spanId=%X{spanId:-N/A}] - %msg%n"
  file:
    name: logs/account-service.log
    max-size: 10MB
    max-history: 30
resilience4j:
  circuitbreaker:
    instances:
      accountDependency:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 20s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException

  bulkhead:
    instances:
      accountDependency:
        maxConcurrentCalls: 10
        maxWaitDuration: 100ms

  timelimiter:
    instances:
      accountDependency:
        timeoutDuration: 2s
        cancelRunningFuture: true


# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha

security:
  oauth2:
    resourceserver:
      jwt:
        # JWT validation URI from your OAuth2 provider
        jwk-set-uri: ${OAUTH2_JWK_SET_URI:https://your-auth-server/.well-known/jwks.json}
        # Token issuer validation
        issuer-uri: ${OAUTH2_ISSUER_URI:https://your-auth-server}

# Data configuration for audit
data:
  auditing:
    enabled: true
    auto-configuration: true
# CORS Configuration (can be overridden)
cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:8080
    - https://yourdomain.com
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: Content-Type,Authorization,X-Trace-ID,X-Request-ID
  exposed-headers: X-Trace-ID,X-Request-ID,Content-Type
  max-age: 3600