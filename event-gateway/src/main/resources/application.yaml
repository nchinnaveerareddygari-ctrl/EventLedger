spring:
  application:
    name: event-gateway
  datasource:
    url: jdbc:h2:mem:eventgateway;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.eventledger: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/event-gateway.log

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  show-actuator: true


security:
  # Resource Server (incoming JWT validation from Event Gateway clients)
  oauth2:
    resourceserver:
      jwt:
        issuer-uri: ${OKTA_ISSUER_URI:https://your-tenant.okta.com}
        jwk-set-uri: ${OKTA_ISSUER_URI:https://your-tenant.okta.com}/v1/keys

    # OAuth2 Client (Event Gateway calling Account Service)
    client:
      registration:
        account-service-client:
          client-id: ${ACCOUNT_SERVICE_CLIENT_ID}
          client-secret: ${ACCOUNT_SERVICE_CLIENT_SECRET}
          authorization-grant-type: client_credentials
          scope: read,write
      provider:
        okta:
          token-uri: ${OKTA_ISSUER_URI:https://your-tenant.okta.com}/v1/token

oauth2:
account-service:
  client-id: account-service-client